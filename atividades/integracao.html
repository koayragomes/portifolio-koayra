<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integração</title>
    <style>

        body{
            background-color: rgb(102, 26, 172);
        }

        .container {
            width: 500px;
            margin: 40px auto;
            background-color: rgb(198, 137, 255);
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            color: rgb(255, 255, 255);
        }

        label{
            display: block;
            margin-top: 10px;
            color: rgb(255, 255, 255);
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        .radio-grupo{
            margin-top: 5px;
            color: rgb(255, 255, 255);
        }

        button{
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background-color: blueviolet;
            color: aliceblue;
            border: none;
            cursor: pointer;
        }

        #resultado{
            margin-top: 20px;
            padding: 10px;
            background-color: rgb(223, 190, 255);
            border-radius: 5px;
        }

        .erro {
            color: rgb(0, 0, 0);
        }

        .sucesso {
            color: rgb(216, 104, 231);
        }

    </style>
</head>
<body>
    <div class="container">
        <h2>Atendimento</h2>

        <form id="formulario">

            <label> Nome:</label>
            <input type="text" id="Nome">

            <label> Idade:</label>
            <input type="number" id="Idade">

            <label> Tipo de Atendimento:</label>
            <select id="tipo">
                <option value="">Selecione</option>
                <option value="Tecnico">Técnico</option>
                <option value="Administrativo">Administrativo</option>
                <option value="Suporte">Suporte</option>

            </select>

            <label>Prioridade:</label>
            <div class="radio-grupo">
                <input type="radio" name="Prioridade" value="baixa"> Baixa
                <input type="radio" name="Prioridade" value="media"> Média
                <input type="radio" name="Prioridade" value="alta"> Alta

            </div>

            <button type="submit">Enviar</button>
        </form>

        <div id="resultado"></div>
    </div>

    <script>
        document.getElementById("formulario").addEventListener("submit", function(event){
            event.preventDefault();

            let nome = document.getElementById("Nome").value;
            let idade = document.getElementById("Idade").value;
            let tipo = document.getElementById("tipo").value;

            let prioridadeSelecionada = document.querySelector('input[name="prioridade"]:checked');
            let prioridade = prioridadeSelecionada ? prioridadeSelecionada.value : "";

            let  resultado = document.getElementById("resultado");

            if(nome === "") {
                resultado.innerHTML = "<p class = 'erro'> O nome é obrigatório!</p>"
                return;
            }

            if(idade === "" || idade <  0) {
                 resultado.innerHTML = "<p class = 'erro'> A idade está inválida!</p>"
                return;
            }

            let mensagem =  ""
            if(prioridade === "Alta") {
                mensagem += "Atendimento Urgente! <br>"
            }

            if(tipo === "Tecnico") {
                 mensagem += "Encaminhar para a equipe técnica! <br>"
            }

            if(idade < 18) {
                 mensagem += "Necessário responsável! <br>"
            }

            resultado.innerHTML = `
                <p class= "sucesso"><strong> Resumo do atendimento:</strong></p>
                Nome: ${nome}<br>
                Idade: ${idade}<br>
                Tipo: ${tipo}<br>
                Prioridade: ${prioridade}<br>
                ${mensagem}

            `;

        });
    </script>
</body>
</html>
